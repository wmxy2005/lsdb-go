  <path d="M323 382 Q323 351 353 342 L730 232 Q765 222 765 258 L765 623 Q765 652 736 661 L356 776 Q323 786 323 751 Z" fill="#2532C9" opacity="0.12" transform="translate(14 16)"/>
  <path d="M323 382 Q323 351 353 342 L730 232 Q765 222 765 258 L765 623 Q765 652 736 661 L356 776 Q323 786 323 751 Z" fill="url(#midCard)" stroke="#2DE4EC" stroke-width="4"/>
