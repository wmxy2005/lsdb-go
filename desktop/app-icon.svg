    </linearGradient>
    <radialGradient id="bgGlow" cx="42%" cy="24%" r="74%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.46"/>
      <stop offset="0.58" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
