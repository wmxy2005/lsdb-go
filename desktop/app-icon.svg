<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="LSDB optimized vector icon tightly centered with minimal margins">
  <defs>
    <linearGradient id="bg" x1="70" y1="55" x2="955" y2="990" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFE7FF"/>
