  <path d="M421 858 Q421 890 451 881 L852 756 Q879 748 880 721" fill="none" stroke="#D7DEFF" stroke-opacity="0.9" stroke-width="2"/>
  <!-- front card content: inner lines and right chips aligned with the white panel tilt -->
  <g id="front-card-content" stroke-linejoin="round">
    <!-- All inner elements share the same -0.298 slope as the front white panel's top edge. -->
    <g transform="matrix(1 -0.298 0 1 0 0)">
      <!-- row 1 -->
      <rect x="516" y="686" width="174" height="34" rx="11" fill="#2337CF" opacity="0.14" transform="translate(3 7)"/>
      <rect x="516" y="686" width="174" height="34" rx="11" fill="url(#lineGrad)"/>
      <rect x="727" y="677" width="52" height="52" rx="10" fill="#2337CF" opacity="0.12" transform="translate(3 7)"/>
      <rect x="727" y="677" width="52" height="52" rx="10" fill="url(#chipTop)"/>

      <!-- row 2 -->
      <rect x="516" y="790" width="174" height="34" rx="11" fill="#2337CF" opacity="0.14" transform="translate(3 7)"/>
      <rect x="516" y="790" width="174" height="34" rx="11" fill="url(#lineGrad)"/>
      <rect x="727" y="781" width="52" height="52" rx="10" fill="#2337CF" opacity="0.12" transform="translate(3 7)"/>
      <rect x="727" y="781" width="52" height="52" rx="10" fill="url(#chipMid)"/>

      <!-- row 3 -->
      <rect x="516" y="894" width="174" height="34" rx="11" fill="#2337CF" opacity="0.14" transform="translate(3 7)"/>
      <rect x="516" y="894" width="174" height="34" rx="11" fill="url(#lineGrad)"/>
      <rect x="727" y="885" width="52" height="52" rx="10" fill="#2337CF" opacity="0.12" transform="translate(3 7)"/>
      <rect x="727" y="885" width="52" height="52" rx="10" fill="url(#chipBot)"/>
